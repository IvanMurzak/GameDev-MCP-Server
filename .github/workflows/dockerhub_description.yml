# Syncs README.md to the Docker Hub repository "Overview" + short description
# for aigamedeveloper/mcp-server. Runs whenever the README (or its images)
# change on main, or on demand. Deliberately DECOUPLED from the image build
# (deploy_docker.yml) so a docs-only change never rebuilds or republishes the
# Docker image.
#
# NOTE: peter-evans/dockerhub-description updates the description via the Docker
# Hub REST API. DOCKERHUB_TOKEN must be a PAT with description-write scope on an
# account with admin rights to the repo (or the account password); otherwise the
# PATCH returns 401/403. The sync step is best-effort (continue-on-error) so a
# missing/under-scoped credential degrades to a warning instead of failing CI —
# the overview simply won't update until the credential is fixed.

name: dockerhub-description

on:
  push:
    branches: [main]
    paths:
      - README.md
      - docs/img/**
      - .github/workflows/dockerhub_description.yml
  workflow_dispatch:

jobs:
  update-dockerhub-description:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Sync README to Docker Hub overview
        continue-on-error: true # best-effort publish; never fail CI on a credential issue
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: aigamedeveloper/mcp-server
          short-description: "Engine-agnostic MCP server for the Unity, Godot & Unreal MCP plugins (Model Context Protocol)"
          readme-filepath: ./README.md
          enable-url-completion: true
