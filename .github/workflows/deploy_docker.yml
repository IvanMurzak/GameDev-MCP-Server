# Builds and pushes the multi-arch Docker image to Docker Hub
# (aigamedeveloper/mcp-server). Mirrors the engine repos' deploy.yml
# docker job. Triggered by a published release (version taken from the
# release tag) or manually via workflow_dispatch.

name: deploy-docker

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      version:
        description: "Deploy to Docker Hub version (e.g., 8.0.0)."
        required: true
        type: string

jobs:
  deploy-docker-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Extract version from input or release tag
        id: version
        run: |
          version=${{ inputs.version || github.event.release.tag_name }}
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "Extracted version: $version"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            aigamedeveloper/mcp-server:${{ steps.version.outputs.version }}
            aigamedeveloper/mcp-server:latest
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Syncs README.md to the Docker Hub repository "Overview" (and short
  # description). Runs independently of the image build so a description-sync
  # hiccup never fails the image release, and vice versa.
  # NOTE: peter-evans/dockerhub-description updates the description via the
  # Docker Hub REST API. DOCKERHUB_TOKEN must be a PAT with write scope (or the
  # account password); a read-only token will 401 here.
  update-dockerhub-description:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Sync README to Docker Hub overview
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: aigamedeveloper/mcp-server
          short-description: "Engine-agnostic MCP server for the Unity, Godot & Unreal MCP plugins (Model Context Protocol)"
          readme-filepath: ./README.md
          enable-url-completion: true
